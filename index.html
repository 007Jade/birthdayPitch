<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Patch v3.0 - Animation System</title>

<style>

/* =========================
   🌸 背景系统（乌萨奇风）
========================= */
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
}

/* 背景图 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    filter:blur(6px) brightness(0.95);
    z-index:-2;
}

/* 粉色叠层 */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(255,220,240,0.35);
    z-index:-1;
}

/* =========================
   🧁 卡片
========================= */
.card{
    background:rgba(255,255,255,0.75);
    max-width:900px;
    margin:20px auto;
    padding:24px;
    border-radius:18px;
    backdrop-filter:blur(12px);
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    transform:translateY(0);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-2px);
}

/* =========================
   🎀 按钮系统
========================= */
button{
    background:linear-gradient(135deg,#ff4fa3,#ff7ac6);
    border:none;
    padding:12px 18px;
    border-radius:12px;
    color:white;
    cursor:pointer;
    margin:5px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.08);
}

/* =========================
   🐰 乌萨奇角色系统
========================= */
#usagi{
    position:fixed;
    right:20px;
    bottom:20px;
    width:110px;
    display:none;
    z-index:9999;
    animation:bounce 1s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-14px);}
}

/* =========================
   ✨ 粒子系统
========================= */
#fx{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:9998;
}

.particle{
    position:absolute;
    animation:fall linear forwards;
}

@keyframes fall{
    from{transform:translateY(-10vh) rotate(0);}
    to{transform:translateY(110vh) rotate(360deg);}
}

/* =========================
   🎬 Booting动画
========================= */
#boot{
    position:fixed;
    inset:0;
    background:#fff0f6;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10000;
    font-size:18px;
}

.bar{
    width:240px;
    height:10px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.bar div{
    height:100%;
    width:0%;
    background:#ff4fa3;
    animation:load 2s forwards;
}

@keyframes load{
    to{width:100%;}
}

/* =========================
   💬 toast
========================= */
.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 16px;
    border-radius:12px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    z-index:10001;
}

/* hidden */
.hidden{display:none !important;}

</style>
</head>

<body>

<!-- 🎬 Booting -->
<div id="boot">
    <div>Initializing Birthday OS...</div>
    <div class="bar"><div></div></div>
</div>

<!-- 🐰 乌萨奇 -->
<img id="usagi" src="https://raw.githubusercontent.com/yourrepo/usagi.png">

<!-- 粒子 -->
<div id="fx"></div>

<!-- ================= UI（完全保留你结构） ================= -->

<div class="card">
<h1>🎂 Birthday Patch v3.0</h1>

<p>系统已启动</p>

<button onclick="birthday()">🎉 生日系统</button>
<button onclick="wish()">🎁 祝福</button>
<button onclick="showLog()">📌 日志</button>
<button onclick="showMission()">🚨 任务</button>

<pre>
Initializing...

[✓] Age +1
[✓] Happiness +10000
[✓] Health +10000
[✓] Bugs Fixed
</pre>

</div>

<div class="card">
<h2>🎁 随机祝福</h2>
<p id="wish"></p>
</div>

<div class="card hidden" id="log">
<h2>📌 隐藏日志</h2>
<p>系统运行正常</p>
</div>

<div class="card hidden" id="mission">
<h2>🚨 任务系统</h2>
<pre>share → download → real_url</pre>
</div>

<div class="card" style="text-align:center;opacity:.6;">
Birthday Patch v3.0 - Full Animation System
</div>

<script>

const fx=document.getElementById("fx");

/* 🎬 boot结束 */
window.onload=()=>{
    setTimeout(()=>{
        document.getElementById("boot").style.display="none";
    },2000);
};

/* 🐰 乌萨奇 */
function showUsagi(){
    const u=document.getElementById("usagi");
    u.style.display="block";
    setTimeout(()=>u.style.display="none",3000);
}

/* 🎉 主事件 */
function birthday(){

    showUsagi();
    toast("🐰 Birthday Mode Activated");

    const items=["🎂","🎉","✨","🌸","💖","🎈"];

    for(let i=0;i<50;i++){
        const p=document.createElement("div");
        p.className="particle";
        p.innerText=items[Math.floor(Math.random()*items.length)];
        p.style.left=Math.random()*100+"vw";
        p.style.top="-10vh";
        p.style.fontSize=(18+Math.random()*22)+"px";
        p.style.animationDuration=(2+Math.random()*2.5)+"s";
        fx.appendChild(p);
    }

    setTimeout(()=>fx.innerHTML="",4500);
}

/* 🎁 */
function wish(){
    showUsagi();
    document.getElementById("wish").innerText="愿你被乌萨奇持续祝福 🐰✨";
}

/* 📌 */
function showLog(){
    showUsagi();
    document.getElementById("log").classList.remove("hidden");
}

/* 🚨 */
function showMission(){
    showUsagi();
    document.getElementById("mission").classList.remove("hidden");
}

/* 💬 toast */
function toast(text){
    const t=document.createElement("div");
    t.className="toast";
    t.innerText=text;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

</script>

</body>
</html>
